version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: campus_quest_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campus_quest
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: campus_quest_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Commander (Dev UI) ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: campus_quest_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    profiles:
      - tools

  # ─── Judge Sandbox Images (build only, not run as services) ──────────────────
  judge-cpp:
    build:
      context: ./apps/backend/docker/cpp
      dockerfile: Dockerfile
    image: campus-quest-judge-cpp:latest
    profiles:
      - build-images

  judge-c:
    build:
      context: ./apps/backend/docker/c
      dockerfile: Dockerfile
    image: campus-quest-judge-c:latest
    profiles:
      - build-images

  judge-java:
    build:
      context: ./apps/backend/docker/java
      dockerfile: Dockerfile
    image: campus-quest-judge-java:latest
    profiles:
      - build-images

  judge-python:
    build:
      context: ./apps/backend/docker/python
      dockerfile: Dockerfile
    image: campus-quest-judge-python:latest
    profiles:
      - build-images

volumes:
  postgres_data:
  redis_data:
